name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.game }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        game: [snake, breakout]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libasound2-dev \
            libpulse-dev \
            libudev-dev

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-

      - name: Cache downloaded font
        uses: actions/cache@v4
        with:
          path: assets/fonts/DejaVuSans.ttf
          key: font-dejavu-2.37

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DGAME=${{ matrix.game }}

      - name: Build
        run: cmake --build build --parallel
